{% load static %}
<button
  id="chat-toggle-button"
  class="z-10 chat-toggle cursor-pointer bg-violet-sky text-white rounded-full w-10 h-10 flex items-center justify-center fixed bottom-4 right-10 cursor-pointer shadow-lg"
  onclick="toggleChat()">
  <span class="material-symbols-outlined">
    chat_bubble
  </span>
</button>

<div id="chat-popup" class="bg-black/30 chat-popup hidden fixed inset-0 flex items-end justify-end right-4 bg-opacity-70 z-50">
  <div class="bg-white w-[70%] max-w-xs shadow-lg p-4 rounded-lg text-black backdrop-blur-sm flex flex-col h-[550px]">

    <div class="chat-header bg-violet-sky text-white p-4 w-full rounded-t-md relative">
      <button onclick="toggleChat()"
        class="absolute top-2 right-2 text-white text-xl font-bold focus:outline-none">
        ×
      </button>
      <p class="font-semibold text-xl">Hi there!</p>
      <p class="font-semibold text-xl">I am PharmaBot</p>
      <p id="initial-bot-message" class="text-base font-normal text-white mt-3 mb-5"></p>
    </div>

    <div id="message-container" class="flex-1 overflow-y-auto p-4 border-t-0 border border-violet-sky rounded-md bg-white text-black w-full mx-auto rounded-b-md shadow -mt-4 relative z-10 custom-scrollbar">
      </div>

    <div class="chat-options-area p-4 w-full mt-auto flex flex-col gap-3">
      <div id="initial-options-area" class="flex flex-wrap gap-2 justify-center">
        </div>
      <div id="sub-options-area" class="flex flex-wrap gap-2 justify-center hidden">
        </div>
      
      <div id="custom-query-input-area" class="p-3 bg-gray-50 border-t flex flex-col gap-2 hidden">
          <textarea id="custom-query-textarea"
                    class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    rows="3" placeholder="Type your query here..."></textarea>
          <button id="submit-custom-query-btn"
                  class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 transition duration-200">
              Submit Query
          </button>
      </div>

    </div>
  </div>
</div>



<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

{% block js %}
    <script src="{% static 'js/chatbot.js' %}"></script>
{% endblock %}
