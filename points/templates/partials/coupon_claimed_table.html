{% for entry in claimed_coupons %}
<tr>
  <td class="px-4 py-4.5 text-center flex flex-col items-center">
    {{ entry.date_claimed }}
  </td>
  <td class="px-4 py-4.5 text-center">{{ entry.coupon.category }}</td>
  <td class="px-4 py-4.5 text-center">{{ entry.coupon.brand_name }}</td>
  <td class="px-4 py-4.5 text-center flex flex-col items-center">
    {{ entry.expiry_date }}
  </td>
</tr>
{% empty %}
<tr>
  <td colspan="4" class="text-center py-4 text-gray-500">No claimed coupons found.</td>
</tr>
{% endfor %}
