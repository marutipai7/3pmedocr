{% for c in coupons %}
<div class="bg-white mt-4 p-4 rounded-md shadow-lg coupon-card">
  <div class="flex lg:justify-between lg:items-stretch flex-col lg:flex-row h-full gap-4">
    
    <!-- Left section -->
    <div class="flex flex-col flex-1 justify-between">
      <p class="font-semibold text-sm text-{{ text }} tracking-[0.25em] uppercase">
        {{ c.category }} : {{ c.brand_name }}
      </p>
      <p class="font-bold text-lg mt-1">{{ c.title }}</p>
      <p class="font-normal text-base text-light-gray1 w-full">
        {{ c.description }}
      </p>
    </div>

    <!-- Middle section -->
    <div class="flex flex-col justify-between pt-4 lg:pt-0 lg:w-48">
      <div class="flex justify-between items-center gap-6">
        <p class="font-normal text-base">Redeemed</p>
        <p class="text-xs font-medium">{{ c.redeemed_count }}/{{ c.max_redemptions }}</p>
      </div>
      <div class="bg-gray-300 h-2 rounded-full w-full mt-2">
        <div class="bg-green-500 h-2 rounded-full" style="width: {{ c.percent_used }}%;"></div>
      </div>
    </div>

    <!-- Divider -->
    <div class="hidden lg:block h-auto w-px bg-{{ primary_bg }} mx-4"></div>

    <!-- Right section -->
    <div class="pt-4 lg:pt-0 lg:w-48 flex items-center lg:items-end">
      <button 
        data-coupon-id="{{ c.id }}" 
        data-code="{{ c.code }}"
        class="bg-{{ primary_bg }} font-bold text-lg text-white w-full rounded-md p-2 flex items-center gap-2 justify-center cursor-pointer claim-btn"
      >
        {{ c.code }}
        <span class="material-symbols-outlined">content_copy</span>
      </button>
    </div>

  </div>
</div>
{% endfor %}
