<div class="flex justify-center items-center mt-4 space-x-2">
  {% if page_obj.has_previous %}
    <button onclick="rewardClaimed('{{ search }}', '{{ start_date }}', '{{ end_date }}', {{ page_obj.previous_page_number }})"
            class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">
      Previous
    </button>
  {% endif %}

  {% for num in page_obj.paginator.page_range %}
    {% if page_obj.number == num %}
      <span class="px-3 py-1 bg-blue-500 text-white rounded">{{ num }}</span>
    {% else %}
      <button onclick="rewardClaimed('{{ search }}', '{{ start_date }}', '{{ end_date }}', {{ num }})"
              class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">
        {{ num }}
      </button>
    {% endif %}
  {% endfor %}

  {% if page_obj.has_next %}
    <button onclick="rewardClaimed('{{ search }}', '{{ start_date }}', '{{ end_date }}', {{ page_obj.next_page_number }})"
            class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">
      Next
    </button>
  {% endif %}
</div>
