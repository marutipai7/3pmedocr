{% extends "dashboard/layout.html" %}
{% load static %}
{% block title %}Orders{% endblock %}

{% block content %}
            <div class="relative transition-all duration-300 main-content bg-slate-white h-full flex-1 flex flex-col 
                        gap-4 sm:gap-6 lg:gap-8 
                        p-3 sm:p-4 lg:p-6
                        overflow-y-auto scroll">
                <div class="bg-white p-4 sm:p-5 lg:p-6 rounded-lg shadow-md w-full">
                    <div class="flex items-center gap-2">
                        <img src="/static/images/order_icon.svg" alt="order icon" class="w-[20px] h-[20px] sm:w-[24px] sm:h-[24px]" />
                        <p class="text-black font-semibold text-base">Orders</p>
                    </div>
                    <div
                        class="show-sidebar-toggle hidden fixed top-[100px] left-12 z-50 h-10 w-10 bg-light-teal items-center justify-center rounded-r-md cursor-pointer">
                        <span class="material-symbols-outlined bold-weight text-deep-teal-green">
                            arrow_forward_ios
                        </span>
                    </div>
                    <!-- TAB CONTENT SECTIONS -->
                    {% include 'partials/upcoming-orders.html' %}
                    {% include 'partials/order_details_popup.html' %}
                </div>
            </div>

{% endblock %}

{% block extra_js %}
      <script src="/static/js/tabs.js"></script>
      <script src="/static/js/order.js"></script>
      <script src="/static/js/table-pagination.js"></script>
{% endblock %}
