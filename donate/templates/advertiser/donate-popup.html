{% load static %}

<div id="donatePopup"
    class="donate-popup donation-popup fixed inset-0 hidden items-center justify-center pointer-events-none bg-black/50 z-50">
    <!-- Popup Box -->
    <div
    class="bg-white text-black rounded-2xl max-w-[520px] max-h-[560px] w-full p-6 shadow-xl relative flex flex-col justify-between pointer-events-auto">

    <button id="openDonatePopup" class="donate-close-btn absolute top-2 right-2 text-2xl font-bold text-gray-500 hover:text-red-600">
        &times;
    </button>                        

    <!-- Popup Content -->
    <div>
        <div class="flex justify-center">
            <img src="/static/images/successfull.gif" alt="Success" class="w-24 h-24" />
        </div>
        <h2 class="text-center text-2xl font-semibold mb-6 text-dark-gray">Donation
            Successful</h2>
        <div>
            <p class="text-base font-semibold mb-2 text-dark-gray">Transfer details</p>
            <p class="text-sm font-normal text-dark-gray mb-1">Transfer method</p>
            <div
                class="p-3  border border-gray-300 rounded-md flex items-center justify-between">
                <div>
                    <p class="font-semibold text-base text-jet-black">Amazon pay ICICI
                        bank
                        credit card</p>
                    <p class="text-xs text-gray-600 flex items-center gap-x-3">
                        **3425
                        <img src="/static/images/visa.svg" alt="Visa" class="w-6 h-6" />
                        | Gaurav Yadav
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Order Info -->
    <div class="text-sm mt-6 text-gray-700">
        <div class="flex justify-between mb-2">
            <span class="text-base font-normal text-medium-gray">Transfer ID</span>
            <span class="text-base font-semibold text-dark-gray" data-popup-transaction-id>ID12345574324324</span>
        </div>
        <div class="flex justify-between mt-4 items-center">
            <p class="text-base font-normal text-light-gray1">Amount to NGO</p>
            <div class="flex items-center gap-1">
                <p class="text-lg font-semibold text-dark-gray" data-popup-amount-to-ngo>₹0.00</p>
                <span class="material-symbols-outlined">
                    visibility
                </span>
            </div>
        </div>
        <div class="flex justify-between mt-1 items-center">
            <p class="text-base font-normal text-light-gray1">Platform Fee (2%)</p>

            <div class="flex items-center gap-1">
                <p class="text-lg font-semibold text-dark-gray" data-popup-platform-fee>₹0.00</p>
                <span class="material-symbols-outlined">
                    visibility
                </span>
            </div>
        </div>
        <div class="flex justify-between mt-1">
            <p class="text-base font-normal text-light-gray1">GST on Platform Fee (18%)
            </p>
            <p class="text-lg font-semibold text-dark-gray" data-popup-gst>₹0.00</p>
        </div>
        <div class="flex justify-between mt-3 mb-4">
            <p class="text-xl font-semibold text-dark-gray">Total Amount Donor Pays</p>
            <p class="text-xl font-semibold text-dark-gray" data-popup-total-amount>₹0.00</p>
        </div>
    </div>
</div>
