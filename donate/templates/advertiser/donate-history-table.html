{% load static %}

<div class="donation-history tab-content pt-8 space-y-6 hidden">
    <!-- Search + Filter Section for Donation History -->
     <div class="flex items-center gap-5 mb-4">
        <h1 class="font-semibold text-base text-dark-gray">Donation history</h1>
        {% comment %}<div class="flex items-center gap-2 w-full max-w-[400px] h-[40px] rounded-[6px] bg-light-white px-2">
        <span class="material-symbols-outlined text-dark-gray mr-2">search</span>
            <input
            id="donation_search"
            type="text"
            name="donation_query"
            placeholder="Search by Post Type or NGO Name"
            value="{{ donation_query }}"
            class="w-full h-full py-0 text-sm border-none bg-transparent focus:outline-none focus:ring-0 placeholder:text-medium-gray"
            />
        </div>
            <select id="limitSelect" name="limit" class="cursor-pointer flex items-center gap-1 px-7 py-2 border border-dark-blue rounded-xl text-dark-blue">
            <option value="50" selected>50 Rows</option>
            <option value="100">100 Rows</option>
            <option value="200">200 Rows</option>
            </select>

            <button id="exportCSVBtn"
            data-url="{% url 'export-donations-csv' %}"
            class="cursor-pointer flex items-center gap-1 px-4 py-2 border border-dark-blue rounded-xl text-dark-blue">
            <span class="material-symbols-outlined">file_export</span>
            <span>Export</span>
            </button>              
    </div> {% endcomment %}
    <div class="flex items-center justify-end gap-5 w-full sm:w-5/6">
            <div class="w-full max-w-[280px] rounded-[6px] bg-light-white flex items-center gap-2 px-2">
                <span class="material-symbols-outlined text-dark-gray">
                search
                </span>
                <input id="post_history_query" name="post_history_query" type="text" placeholder="Search by name or categories"
                class="w-full py-2.5 border-none bg-transparent focus:outline-none focus:ring-0 placeholder:text-medium-gray" />
            </div>
            <div class="dropdown relative flex justify-end">
                <button
                class="filterToggle w-full max-w-[90px] h-[40px] border border-living-coral rounded-[10px] text-living-coral flex items-center justify-center gap-1 cursor-pointer group hover:bg-living-coral hover:text-white px-3"
            >
                <span class="material-symbols-outlined text-living-coral group-hover:text-white">
                keyboard_arrow_down
                </span>
                Filter
            </button>
                <div
                class="filterDropdown hidden absolute right-0 top-10 bg-white text-dark-gray shadow-[4px_4px_10px_2px_#00000026] rounded-md w-44 z-10"
                >
                <div
                    class="p-2 pl-4 flex justify-between items-center hover:bg-living-coral hover:text-white rounded"
                >
                    Custom date<span class="material-symbols-outlined calendar-icon"
                    >calendar_today
                    </span>
                </div>
                <div 
                    class="postdaterange p-2 pl-4 cursor-pointer hover:bg-living-coral hover:text-white rounded"
                    data-range="1 Week"
                >
                    1 Week
                </div>
                <div 
                    class="postdaterange p-2 pl-4 cursor-pointer hover:bg-living-coral hover:text-white rounded"
                    data-range="1 Month"
                >
                    1 Month
                </div>
                <div 
                    class="postdaterange p-2 pl-4 cursor-pointer hover:bg-living-coral hover:text-white rounded"
                    data-range="1 Year"
                >
                    1 Year
                </div>
                </div>
                <div
                    class="datepicker-container hidden px-4 pb-3 absolute top-full right-0 lg:right-[180px] z-50 bg-white shadow-md rounded">
                    <div class="datepicker-inline"></div>
                </div>
            </div>
            <button
                class="view-saved-post-history-btn w-full max-w-[100px] h-[40px] border border-living-coral rounded-[10px] text-living-coral flex items-center justify-center gap-1 cursor-pointer group hover:bg-living-coral hover:text-white">
                <span class="material-symbols-outlined text-living-coral group-hover:text-white">
                file_export
                </span>
                <span class="hidden sm:block">Export</span>
            </button>
        </div>
    </div>
    
    <div class="relative max-h-[calc(9*2rem)] overflow-y-auto overflow-x-auto no-scrollbar mt-10">
        <table class="table-auto min-w-full text-sm text-dark-gray whitespace-nowrap">
        <thead class="bg-dark-blue  text-white">
            <tr>
            <th class="text-center px-4 py-4 border-r border-white">Date & Time
                <img src="/static/images/sort-alt.svg" alt="sort" class="inline ml-2" />
            </th>
            <th class="px-4 py-4 text-center border-r border-white">Post Name</th>
            <th class="text-center px-4 py-4 border-r border-white">NGO Name</th>
            <th class="text-center px-4 py-4 border-r border-white">Post Type</th>
            <th class="text-center px-4 py-4 border-r border-white">Paid Donation</th>
            <th class="text-center px-4 py-4 border-r border-white">Status</th>
            <th class="text-center px-4 py-4 border-r border-white">Actions</th>
            </tr>
        </thead>
        <tbody class="donate-history">
            {% include 'advertiser/partials/donate-history.html' %}
        </tbody>
        </table>
    </div>
    <div id="paginationWrapper" class="pagination mt-4 flex justify-end gap-2 items-center"></div>



</div>
