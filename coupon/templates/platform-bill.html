{% load static %}

<div class="platform-bill-modal fixed inset-0 bg-semi-transparent-black items-center justify-center z-50 hidden h-full">
    <div class="bg-snow-gray rounded-lg p-3 max-w-md w-full h-[80vh]">
        <div class="flex items-center justify-between h-10">
            <div class="flex items-center gap-3">
            <span
                class="material-symbols-outlined cursor-pointer bg-living-coral text-white rounded-md p-1"
                >share</span
            >
            <span
                class="material-symbols-outlined cursor-pointer bg-living-coral text-white rounded-md p-1"
                >download</span
            >
            </div>
            <p class="font-semibold text-lg text-living-coral">
            Platform Bill
            </p>
            <button class="close-platform-bill">
            <span class="material-symbols-outlined cursor-pointer"
                >close</span
            >
            </button>
        </div>
        <div class="h-[calc(100%-40px)] overflow-y-auto scroll">
            <img
            src="/static/images/platformbill-receipt.svg"
            alt="Incorporation Certificate"
            class="w-full rounded"
        />
        </div>
    </div>
</div>
