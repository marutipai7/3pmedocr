{% load static %}

<div class="download-popup popup hidden fixed inset-0 items-center justify-center" style="background: rgba(0, 0, 0, 0.4); padding-left: 0.75rem; padding-right: 0.75rem; z-index: 50;">
  <div style="background-color: #ffffff; border-radius: 10px; max-width: 560px; height: 640px; width: 100%; overflow-y: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding-bottom: 12px; display: flex; flex-direction: column; gap: 16px;">
    
    <!-- Header -->
    <div style="display: flex; align-items: center; justify-content: space-between; height: 40px; background-color: rgba(255, 111, 97, 1); color: #ffffff; padding: 0 12px;">
      <div style="display: flex; gap: 16px; align-items: center;">
        <span class="material-symbols-outlined" style="cursor: pointer;">share</span>
        <span class="material-symbols-outlined download-btn" style="cursor: pointer;">download</span>
      </div>
      <span style="font-weight: 500;">Coupon Details</span>
      <span class="material-symbols-outlined close-popup" style="cursor: pointer;">close</span>
    </div>

    <div class="download-container" style="height: calc(100% - 40px); overflow-y: auto; scroll-behavior: smooth; padding-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem;">
      <div style="display: flex; flex-direction: column; align-items: center; padding: 0.75rem 1rem;">
        <img class="popup-image" src="" alt="Coupon Image" style="width: 100%; max-height: 15rem; object-fit: contain; border-radius: 0.375rem; margin-bottom: 0.5rem; background: #f5f5f5;" />
      </div>
      <div style="border-top: 1px dashed #d1d5db; margin-bottom: 0.5rem;"></div>
      <div style="padding-left: 1.5rem; padding-right: 1.5rem;">
        <div style="font-weight: 600; color: rgba(255, 111, 97, 1); font-size: 1.125rem; margin-bottom: 0.5rem;">Audience Profile</div>
        <div style="display: grid; grid-template-columns: repeat(auto-fill,minmax(100px,1fr)); gap: 0.5rem 1rem; font-size: 1rem; margin-bottom: 1rem;">
          <div>Age : <span class="popup-age" style="font-weight: 500;"></span></div>
          <div>Gender : <span class="popup-gender" style="font-weight: 500;"></span></div>
          <div>City : <span class="popup-city" style="font-weight: 500;"></span></div>
          <div>Spending Power : <span class="popup-spending" style="font-weight: 500;"></span></div>
        </div>
        <div style="font-weight: 600; color: rgba(255, 111, 97, 1); font-size: 1.125rem; margin-bottom: 0.5rem;">Coupon Details</div>
        <div style="display: grid; grid-template-columns: repeat(auto-fill,minmax(100px,1fr)); gap: 0.5rem 1rem; font-size: 1rem; margin-bottom: 1rem;">
          <div>Name : <span class="popup-title" style="font-weight: 500;"></span></div>
          <div>Offer Type : <span class="popup-offer-type" style="font-weight: 500;"></span></div>
          <div>Category : <span class="popup-category" style="font-weight: 500;"></span></div>
          <div>Brand Name : <span class="popup-brand" style="font-weight: 500;"></span></div>
          <div>Issued : <span class="popup-issued" style="font-weight: 500;"></span></div>
          <div>Redeemed : <span class="popup-redeemed" style="font-weight: 500;"></span></div>
          <div>Valid Till : <span class="popup-validity" style="font-weight: 500;"></span></div>
          <div>Status : <span class="popup-status" style="font-weight: 500; display: inline-block; padding: 0.25rem 0.75rem; border-radius: 0.375rem; background: rgba(245, 255, 250, 1); color: rgba(40, 167, 69, 1);"></span></div>
        </div>
        <div style="font-weight: 600; color: rgba(255, 111, 97, 1); font-size: 1.125rem; margin-bottom: 0.5rem;">Description</div>
        <div style="font-size: 1rem; margin-bottom: 0.5rem;">
          <span class="popup-description"></span>
        </div>
      </div>
      <div style="border-top: 1px dashed #d1d5db;"></div>
        <div style="display: grid; grid-template-columns: repeat(auto-fill,minmax(100px,1fr)); gap: 0.5rem 1rem; font-size: 1rem; padding-left: 1.5rem; padding-right: 1.5rem;">
          <div>Coupon Ref. ID : <span class="popup-id" style="font-weight: 500;"></span></div>
          <div>Issued By : <span class="popup-issued-by" style="font-weight: 500;"></span></div>
          <div>Uploaded On : <span class="popup-uploaded-on" style="font-weight: 500;"></span></div>
        </div>
    </div>
  </div>
</div>
