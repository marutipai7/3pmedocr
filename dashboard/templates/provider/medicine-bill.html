{% load static %}

          <div class="medicine-bill-modal fixed inset-0 bg-semi-transparent-black items-center justify-center z-50 hidden h-full">
            <div class="bg-snow-gray rounded-lg p-3 max-w-md w-full h-[80vh]">
              <div class="flex items-center justify-between h-10">
                <div class="flex items-center gap-3">
                  <span
                    class="material-symbols-outlined cursor-pointer bg-light-sea-green text-white rounded-md p-1"
                    >share</span
                  >
                  <span
                    class="material-symbols-outlined cursor-pointer bg-light-sea-green text-white rounded-md p-1"
                    >download</span
                  >
                </div>
                <p class="font-semibold text-lg text-light-sea-green">
                  Medicine Bill
                </p>
                <button class="close-medicine-bill">
                  <span class="material-symbols-outlined cursor-pointer"
                    >close</span
                  >
                </button>
              </div>
              <div class="h-[calc(100%-40px)] overflow-y-auto scroll">
                <img
                src="/static/images/medicine-bill.svg"
                alt="Incorporation Certificate"
                class="w-full rounded"
              />
              </div>
            </div>
          </div>
